<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BINGO | Профиль</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <aside class="app-sidebar" aria-label="BINGO navigation">
      <div class="side-brand">
        <span>BINGO</span>
        <strong id="navUserName">Player</strong>
      </div>
      <nav class="side-nav">
        <a class="side-nav-link" href="./home.html">Главная</a>
        <a class="side-nav-link" href="./lobby.html">Комнаты</a>
        <a class="side-nav-link" href="./profile.html">Профиль</a>
      </nav>
      <button class="side-nav-logout" id="navLogoutButton" type="button">Выйти</button>
    </aside>

    <main class="auth-shell">
      <section class="auth-scene home-scene" aria-label="Профиль пользователя BINGO">
        <div class="signal-panel" aria-hidden="true">
          <span class="signal-line signal-line-a"></span>
          <span class="signal-line signal-line-b"></span>
          <span class="signal-line signal-line-c"></span>
        </div>

        <article class="auth-card profile-card">
          <div class="auth-kicker">BINGO</div>
          <h1 class="auth-title" data-text="Профиль">Профиль</h1>
          <p class="auth-subtitle" id="profileStatus">Загружаем данные профиля...</p>

          <dl class="profile-grid" aria-label="Данные профиля">
            <div class="profile-row">
              <dt>Username</dt>
              <dd id="profileUsername">...</dd>
            </div>
            <div class="profile-row">
              <dt>Email</dt>
              <dd id="profileEmail">...</dd>
            </div>
            <div class="profile-row">
              <dt>Balance</dt>
              <dd id="profileBalance">...</dd>
            </div>
            <div class="profile-row">
              <dt>Auth ID</dt>
              <dd id="profileAuthId">...</dd>
            </div>
          </dl>

        </article>
      </section>
    </main>

    <script src="../js/api.js?v=ui-1"></script>
    <script src="../js/nav.js?v=ui-1"></script>
    <script src="../js/user.js?v=ui-1"></script>
  </body>
</html>
