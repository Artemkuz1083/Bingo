<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BINGO // Профиль</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="register-page">
    <main class="auth-shell">
      <section class="auth-scene home-scene" aria-label="Профиль пользователя BINGO">
        <div class="signal-panel" aria-hidden="true">
          <span class="signal-line signal-line-a"></span>
          <span class="signal-line signal-line-b"></span>
          <span class="signal-line signal-line-c"></span>
        </div>

        <article class="auth-card profile-card">
          <div class="auth-kicker">BINGO NETWORK // USER PROFILE</div>
          <h1 class="auth-title" data-text="Профиль">Профиль</h1>
          <p class="auth-subtitle" id="profileStatus">Загружаем данные профиля...</p>

          <dl class="profile-grid" aria-label="Данные профиля">
            <div class="profile-row">
              <dt>Username</dt>
              <dd id="profileUsername">...</dd>
            </div>
            <div class="profile-row">
              <dt>Email</dt>
              <dd id="profileEmail">...</dd>
            </div>
            <div class="profile-row">
              <dt>Balance</dt>
              <dd id="profileBalance">...</dd>
            </div>
            <div class="profile-row">
              <dt>Auth ID</dt>
              <dd id="profileAuthId">...</dd>
            </div>
          </dl>

          <div class="home-actions home-actions-grid">
            <a class="auth-button home-button" href="./home.html">
              <span>На главную</span>
            </a>
            <button class="auth-button home-button home-button-secondary" id="logoutButton" type="button">
              <span>Выйти</span>
            </button>
          </div>
        </article>
      </section>
    </main>

    <script src="../js/user.js"></script>
  </body>
</html>
