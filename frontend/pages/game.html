<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BINGO | Игра</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="game-board-layout simple-game-layout" aria-label="Игра BINGO">
        <header class="game-header">
          <div>
            <div class="auth-kicker">BINGO</div>
            <h1 class="game-title">Игра</h1>
          </div>
          <a class="game-link" href="./lobby.html">Комната</a>
        </header>

        <section class="game-panel bingo-card-panel" aria-label="Карточка BINGO">
          <div class="bingo-topline">
            <span id="cardOwner">Карточка не создана</span>
            <span id="markedCounter">0 отмечено</span>
          </div>

          <div class="bingo-card" id="bingoCard" aria-label="Карточка BINGO"></div>

          <div class="combo-panel" aria-label="Комбинации BINGO">
            <div class="combo-title">Комбинации</div>
            <div class="combo-list" id="comboList">
              <span>Откройте карточку</span>
            </div>
          </div>
        </section>

        <aside class="game-panel game-control-panel simple-game-panel" aria-label="Действия">
          <div class="game-id-box">
            <span>Комната</span>
            <strong id="gameIdValue">Не выбрана</strong>
          </div>

          <div class="simple-ball">
            <em id="gameStatusValue">Ожидание</em>
            <span>Последний шар</span>
            <strong id="lastBallValue">...</strong>
            <small id="drawnCountValue">0 выпало</small>
          </div>

          <div class="winner-line is-hidden" id="winnerLine">
            <span>Победитель</span>
            <strong id="winnerValue">...</strong>
          </div>

          <button class="auth-button game-button" id="cardActionButton" type="button">
            <span>Открыть карточку</span>
          </button>

          <button class="auth-button game-button game-button-secondary is-hidden" id="drawBallButton" type="button">
            <span>Достать шар</span>
          </button>

          <button class="auth-button game-button game-button-secondary" id="claimBingoButton" type="button" disabled>
            <span>Заявить BINGO</span>
          </button>

          <p class="auth-message game-message" id="gameMessage" aria-live="polite"></p>
        </aside>
      </section>
    </main>

    <script src="../js/api.js?v=ui-3"></script>
    <script src="../js/game.js?v=ui-3"></script>
  </body>
</html>
