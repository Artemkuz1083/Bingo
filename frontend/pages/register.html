<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BINGO | Регистрация</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-scene" aria-label="Регистрация в BINGO">
        <form class="auth-card" id="registerForm">
          <div class="auth-kicker">BINGO</div>
          <h1 class="auth-title">Создать аккаунт</h1>
          <p class="auth-subtitle">
            Зарегистрируйтесь, чтобы создавать комнаты и играть по карточке.
          </p>

          <label class="field">
            <span>Username</span>
            <input
              type="text"
              name="username"
              autocomplete="username"
              placeholder="player"
              required
            />
          </label>

          <label class="field">
            <span>Email</span>
            <input
              type="email"
              name="email"
              autocomplete="email"
              placeholder="player@example.com"
              required
            />
          </label>

          <label class="field">
            <span>Password</span>
            <input
              type="password"
              name="password"
              autocomplete="new-password"
              placeholder="Минимум 6 символов"
              minlength="6"
              required
            />
          </label>

          <button class="auth-button" type="submit">
            <span>Зарегистрироваться</span>
          </button>

          <p class="auth-message" id="registerMessage" aria-live="polite"></p>

          <div class="auth-footer">
            <span>Уже есть доступ?</span>
            <a href="./login.html">Войти</a>
          </div>
        </form>
      </section>
    </main>

    <script src="../js/api.js?v=ui-1"></script>
    <script src="../js/auth.js?v=ui-1"></script>
  </body>
</html>
