services:
  frontend:
    image: nginx:1.27-alpine
    container_name: bingo-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - auth-service
      - user-service
      - lobby-service
      - card-service
      - winner-service

  auth-service:
    build:
      context: ./auth-service
    container_name: bingo-auth-service
    environment:
      SERVICE_NAME: ${AUTH_SERVICE_NAME}
      DATABASE_URL: ${AUTH_DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      RABBITMQ_URL: ${RABBITMQ_URL}
      USER_EVENTS_EXCHANGE: ${USER_EVENTS_EXCHANGE}
      USER_REGISTERED_ROUTING_KEY: ${USER_REGISTERED_ROUTING_KEY}
      USER_REGISTERED_QUEUE: ${USER_REGISTERED_QUEUE}
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "8001:8000"
    depends_on:
      auth-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-service:
    build:
      context: ./user-service
    container_name: bingo-user-service
    environment:
      SERVICE_NAME: ${USER_SERVICE_NAME}
      DATABASE_URL: ${USER_DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      RABBITMQ_URL: ${RABBITMQ_URL}
      USER_EVENTS_EXCHANGE: ${USER_EVENTS_EXCHANGE}
      USER_REGISTERED_ROUTING_KEY: ${USER_REGISTERED_ROUTING_KEY}
      USER_REGISTERED_QUEUE: ${USER_REGISTERED_QUEUE}
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "8002:8000"
    depends_on:
      user-postgres:
        condition: service_healthy

  user-worker:
    build:
      context: ./user-service
    container_name: bingo-user-worker
    command: ["python", "-m", "app.worker"]
    environment:
      SERVICE_NAME: ${USER_WORKER_SERVICE_NAME}
      DATABASE_URL: ${USER_DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      CORS_ORIGINS: ${CORS_ORIGINS}
      RABBITMQ_URL: ${RABBITMQ_URL}
      USER_EVENTS_EXCHANGE: ${USER_EVENTS_EXCHANGE}
      USER_REGISTERED_ROUTING_KEY: ${USER_REGISTERED_ROUTING_KEY}
      USER_REGISTERED_QUEUE: ${USER_REGISTERED_QUEUE}
    depends_on:
      user-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  lobby-service:
    build:
      context: ./lobby-service
    container_name: bingo-lobby-service
    environment:
      SERVICE_NAME: ${LOBBY_SERVICE_NAME}
      DATABASE_URL: ${LOBBY_DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      CORS_ORIGINS: ${CORS_ORIGINS}
      AUTO_CREATE_TABLES: ${LOBBY_AUTO_CREATE_TABLES}
      LOBBY_GAME_ENGINE_SERVICE_URL: ${LOBBY_GAME_ENGINE_SERVICE_URL}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    ports:
      - "8003:8000"
    depends_on:
      lobby-postgres:
        condition: service_healthy

  card-service:
    build:
      context: ./card-service
    container_name: bingo-card-service
    environment:
      SERVICE_NAME: ${CARD_SERVICE_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
    ports:
      - "${CARD_SERVICE_PORT}:8000"
    depends_on:
      redis:
        condition: service_healthy

  winner-service:
    build:
      context: ./winner-service
    container_name: bingo-winner-service
    environment:
      SERVICE_NAME: ${WINNER_SERVICE_NAME}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      CORS_ORIGINS: ${CORS_ORIGINS}
      RABBITMQ_URL: ${RABBITMQ_URL}
      WINNER_CLAIMS_EXCHANGE: ${WINNER_CLAIMS_EXCHANGE}
      WINNER_CLAIM_SUBMITTED_ROUTING_KEY: ${WINNER_CLAIM_SUBMITTED_ROUTING_KEY}
      WINNER_CLAIMS_QUEUE: ${WINNER_CLAIMS_QUEUE}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX}
      CARD_SERVICE_URL: ${CARD_SERVICE_URL}
      GAME_ENGINE_SERVICE_URL: ${GAME_ENGINE_SERVICE_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      REWARD_AMOUNT: ${WINNER_REWARD_AMOUNT}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS}
    ports:
      - "${WINNER_SERVICE_PORT}:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  winner-worker:
    build:
      context: ./winner-service
    container_name: bingo-winner-worker
    command: ["python", "-m", "app.worker"]
    environment:
      SERVICE_NAME: ${WINNER_WORKER_SERVICE_NAME}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      CORS_ORIGINS: ${CORS_ORIGINS}
      RABBITMQ_URL: ${RABBITMQ_URL}
      WINNER_CLAIMS_EXCHANGE: ${WINNER_CLAIMS_EXCHANGE}
      WINNER_CLAIM_SUBMITTED_ROUTING_KEY: ${WINNER_CLAIM_SUBMITTED_ROUTING_KEY}
      WINNER_CLAIMS_QUEUE: ${WINNER_CLAIMS_QUEUE}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX}
      CARD_SERVICE_URL: ${CARD_SERVICE_URL}
      GAME_ENGINE_SERVICE_URL: ${GAME_ENGINE_SERVICE_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      REWARD_AMOUNT: ${WINNER_REWARD_AMOUNT}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      winner-service:
        condition: service_started

  auth-postgres:
    image: postgres:17-alpine
    container_name: bingo-auth-postgres
    environment:
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
      POSTGRES_USER: ${AUTH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_POSTGRES_USER} -d ${AUTH_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-postgres:
    image: postgres:17-alpine
    container_name: bingo-user-postgres
    environment:
      POSTGRES_DB: ${USER_POSTGRES_DB}
      POSTGRES_USER: ${USER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${USER_POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_POSTGRES_USER} -d ${USER_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  lobby-postgres:
    image: postgres:17-alpine
    container_name: bingo-lobby-postgres
    environment:
      POSTGRES_DB: ${LOBBY_POSTGRES_DB}
      POSTGRES_USER: ${LOBBY_POSTGRES_USER}
      POSTGRES_PASSWORD: ${LOBBY_POSTGRES_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - lobby_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOBBY_POSTGRES_USER} -d ${LOBBY_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: bingo-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bingo-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  auth_postgres_data:
  user_postgres_data:
  lobby_postgres_data:
  rabbitmq_data:
  redis_data:
