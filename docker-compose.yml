services:
  frontend:
    image: nginx:1.27-alpine
    container_name: bingo-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "8081:80"
    depends_on:
      - card-service
      - auth-service
      - user-service
      - lobby-service

  auth-service:
    build:
      context: ./auth-service
    container_name: bingo-auth-service
    environment:
      SERVICE_NAME: auth-service
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@auth-postgres:5432/bingo_auth
      JWT_SECRET_KEY: change-me
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      USER_EVENTS_EXCHANGE: user.events
      USER_REGISTERED_ROUTING_KEY: user.registered
      USER_REGISTERED_QUEUE: user-service.user-registered
      CORS_ORIGINS: "*"
    ports:
      - "8001:8000"
    depends_on:
      auth-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-service:
    build:
      context: ./user-service
    container_name: bingo-user-service
    environment:
      SERVICE_NAME: user-service
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@user-postgres:5432/bingo_users
      JWT_SECRET_KEY: change-me
      JWT_ALGORITHM: HS256
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      USER_EVENTS_EXCHANGE: user.events
      USER_REGISTERED_ROUTING_KEY: user.registered
      USER_REGISTERED_QUEUE: user-service.user-registered
      CORS_ORIGINS: "*"
    ports:
      - "8002:8000"
    depends_on:
      user-postgres:
        condition: service_healthy

  user-worker:
    build:
      context: ./user-service
    container_name: bingo-user-worker
    command: ["python", "-m", "app.worker"]
    environment:
      SERVICE_NAME: user-service-worker
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@user-postgres:5432/bingo_users
      JWT_SECRET_KEY: change-me
      JWT_ALGORITHM: HS256
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      USER_EVENTS_EXCHANGE: user.events
      USER_REGISTERED_ROUTING_KEY: user.registered
      USER_REGISTERED_QUEUE: user-service.user-registered
    depends_on:
      user-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  lobby-service:
    build:
      context: ./lobby-service
    container_name: bingo-lobby-service
    environment:
      SERVICE_NAME: lobby-service
      DATABASE_URL: postgresql+psycopg://postgres:postgres@lobby-postgres:5432/bingo_lobby
      JWT_SECRET_KEY: change-me
      JWT_ALGORITHM: HS256
      CORS_ORIGINS: "*"
      AUTO_CREATE_TABLES: "true"
    ports:
      - "8003:8000"
    depends_on:
      lobby-postgres:
        condition: service_healthy

  card-service:
    build:
      context: ./card-service
    container_name: bingo-card-service
    environment:
      SERVICE_NAME: card-service
      REDIS_HOST: card-redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_KEY_PREFIX: bingo
      JWT_SECRET_KEY: change-me
      JWT_ALGORITHM: HS256
    ports:
      - "8000:8000"
    depends_on:
      card-redis:
        condition: service_healthy

  auth-postgres:
    image: postgres:17-alpine
    container_name: bingo-auth-postgres
    environment:
      POSTGRES_DB: bingo_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bingo_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-postgres:
    image: postgres:17-alpine
    container_name: bingo-user-postgres
    environment:
      POSTGRES_DB: bingo_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bingo_users"]
      interval: 10s
      timeout: 5s
      retries: 5

  lobby-postgres:
    image: postgres:17-alpine
    container_name: bingo-lobby-postgres
    environment:
      POSTGRES_DB: bingo_lobby
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - lobby_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bingo_lobby"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: bingo-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  card-redis:
    image: redis:7-alpine
    container_name: bingo-card-redis
    ports:
      - "6379:6379"
    volumes:
      - card_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  auth_postgres_data:
  user_postgres_data:
  lobby_postgres_data:
  rabbitmq_data:
  card_redis_data:
